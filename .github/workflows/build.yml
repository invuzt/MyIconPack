name: Build Icon Pack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Fix wrapper jar
        run: |
          chmod +x gradlew
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icon-pack-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
