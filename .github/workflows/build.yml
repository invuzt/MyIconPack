name: Build Icon Pack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate launcher icons
        run: |
          pip install pillow -q
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os
          sizes = {"mdpi":48,"hdpi":72,"xhdpi":96,"xxhdpi":144,"xxxhdpi":192}
          for dpi, size in sizes.items():
              path = f"app/src/main/res/mipmap-{dpi}"
              os.makedirs(path, exist_ok=True)
              img = Image.new("RGBA", (size, size), (33, 150, 243, 255))
              img.save(f"{path}/ic_launcher.png")
          EOF

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle 8.2 manually
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icon-pack-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
